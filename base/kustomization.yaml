apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No blanket `namespace:` transformer: these resources deliberately span
# multiple scopes — cluster-scoped (PersesGlobalDatasource),
# open-cluster-management-observability (ScrapeConfig), and
# openshift-cluster-observability-operator (dashboards, via their own
# explicit metadata.namespace). A single override would force the wrong
# namespace onto at least one of them.
resources:
  - dynamic-fleet-thanos-datasource.yaml
  - acm-clusters-overview-custom-metrics-scrapeconfig.yaml
  - ../perses-dashboards/
