apiVersion: v1
kind: ServiceAccount
metadata:
  name: dynamic-fleet-thanos-sa
  namespace: openshift-cluster-observability-operator
---
apiVersion: v1
kind: Secret
metadata:
  name: dynamic-fleet-thanos-secret
  namespace: openshift-cluster-observability-operator
  annotations:
    kubernetes.io/service-account.name: dynamic-fleet-thanos-sa
type: kubernetes.io/service-account-token

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dynamic-fleet-thanos-sa-reader
subjects:
  - kind: ServiceAccount
    name: dynamic-fleet-thanos-sa
    namespace: openshift-cluster-observability-operator
roleRef:
  kind: ClusterRole
  name: cluster-monitoring-view
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: dynamic-fleet-thanos-datasource
  namespace: openshift-cluster-observability-operator
spec:
  client:
    tls:
      caCert:
        certPath: /ca/service-ca.crt
        type: file
      enable: true
  config:
    default: false
    display:
      name: ACM MultiCluster Thanos Engine
    plugin:
      kind: PrometheusDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            secret: dynamic-fleet-thanos-datasource-secret
            url: 'https://rbac-query-proxy.open-cluster-management-observability.svc.cluster.local:8443'

