apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: acm-clusters-overview
  namespace: openshift-cluster-observability-operator
spec:
  config:
    display:
      name: "ACM - Cluster Health Overview"
      description: "Fleet-wide cluster health. Select a cluster from the dropdown to drill in."
    duration: 1h
    variables:
      # Cluster picker — populated from live metric data so it automatically
      # includes every managed cluster that is reporting to RHACM Observability.
      - kind: ListVariable
        spec:
          allowAllValue: false
          allowMultiple: false
          display:
            name: Cluster
          name: cluster
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: dynamic-fleet-thanos-datasource
              labelName: cluster
              matchers:
                - cluster_operator_conditions
          sort: alphabetical-asc

      # Resolves to the OpenShift Console base URL for the selected cluster.
      # console_url{cluster="...", url="https://..."} is a gauge RHACM Observability
      # scrapes from every managed cluster; the `url` label carries the full URL.
      - kind: ListVariable
        spec:
          allowAllValue: false
          allowMultiple: false
          display:
            name: Console URL
            hidden: true
          name: console
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: dynamic-fleet-thanos-datasource
              labelName: url
              matchers:
                - 'console_url{cluster="$cluster"}'

    panels:

      # ------------------------------------------------------------------
      # Core Platform
      # Each tile = one component. Green = healthy, yellow = degraded ratio,
      # red = fully down.
      # ------------------------------------------------------------------
      core_platform:
        kind: Panel
        spec:
          display:
            name: "Core Platform — $cluster"
          plugin:
            kind: StatChart
            spec:
              calculation: last
              colorMode: background_solid
              format:
                unit: decimal
              metricLabel: check
              sparkline: {}
              valueFontSize: 10
              mappings:
                - kind: Value
                  spec:
                    value: "0"
                    result: { color: "#f2495c", value: "Down" }
                - kind: Value
                  spec:
                    value: "1"
                    result: { color: "#73bf69", value: "OK" }
              thresholds:
                steps:
                  - { color: "#f2495c", value: 0 }
                  - { color: "#fade2a", value: 0.5 }
                  - { color: "#73bf69", value: 0.999 }
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    seriesNameFormat: "API Server"
                    query: 'sum(up{job="apiserver", cluster="$cluster"} == 1) / count(up{job="apiserver", cluster="$cluster"})'
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    seriesNameFormat: "ETCD"
                    query: 'sum(up{job="etcd", cluster="$cluster"} == 1) / count(up{job="etcd", cluster="$cluster"})'
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    seriesNameFormat: "Kube Controller"
                    query: 'sum(up{job=~"controller-manager|kube-controller-manager", cluster="$cluster"} == 1) / count(up{job=~"controller-manager|kube-controller-manager", cluster="$cluster"})'
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    seriesNameFormat: "Kube Scheduler"
                    query: 'sum(up{job="scheduler", cluster="$cluster"} == 1) / count(up{job="scheduler", cluster="$cluster"})'
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    seriesNameFormat: "ClusterOperators"
                    query: 'count(cluster_operator_conditions{condition=~"Degraded|Progressing", cluster="$cluster"} == 0) / count(cluster_operator_conditions{condition=~"Degraded|Progressing", cluster="$cluster"})'
          links:
            - name: "Cluster Operators"
              url: "${console}/settings/cluster/clusteroperators"
              renderVariables: true
              targetBlank: true

      # ------------------------------------------------------------------
      # Nodes — one row per node, discovered dynamically.
      # Table instead of per-node tiles: node count is unbounded, so a
      # StatChart tile grid turns into an unscrollable wall on a large
      # cluster. Ready and Pressure are pre-joined into a single PromQL
      # query via group_left/count_values (same technique MCOA's own
      # built-in dashboards use, e.g. "etcd Health" in acm-clusters-overview)
      # rather than relying on Perses to join two separate queries by label.
      # ------------------------------------------------------------------
      nodes:
        kind: Panel
        spec:
          display:
            name: "Nodes — $cluster"
          plugin:
            kind: Table
            spec:
              columnSettings:
                - name: node
                  header: Node
                - name: value
                  header: Ready
                  cellSettings:
                    - condition: { kind: Value, spec: { value: "0" } }
                      text: "Not Ready"
                      backgroundColor: "#f2495c"
                    - condition: { kind: Value, spec: { value: "1" } }
                      text: "Ready"
                      backgroundColor: "#73bf69"
                - name: pressure
                  header: Pressure
                  cellSettings:
                    - condition: { kind: Value, spec: { value: "0" } }
                      text: "Under Pressure"
                      backgroundColor: "#f2495c"
                    - condition: { kind: Value, spec: { value: "1" } }
                      text: "OK"
                      backgroundColor: "#73bf69"
                - name: timestamp
                  hide: true
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    # max by (node): strips every other label (job, instance,
                    # etc.) down to just "node", so the table shows one clean
                    # column per node instead of every scrape label.
                    # group_left(pressure) + count_values smuggles the second
                    # query's per-node value in as a "pressure" label on the
                    # same series — min() across all 3 pressure types gives
                    # worst case per node (0 = pressure active, 1 = OK).
                    query: |-
                      max by (node) (kube_node_status_condition{condition="Ready", status="true", cluster="$cluster"})
                      * on (node) group_left (pressure)
                        count_values without () (
                          "pressure",
                          min by (node) (1 - kube_node_status_condition{condition=~"DiskPressure|MemoryPressure|PIDPressure", status="true", cluster="$cluster"})
                        )
          links:
            - name: "Nodes"
              url: "${console}/k8s/cluster/nodes"
              renderVariables: true
              targetBlank: true

      # ------------------------------------------------------------------
      # Workloads — one row per namespace, discovered dynamically.
      # 1 = all pods in that namespace healthy, <1 = some crash-looping.
      # Table instead of per-namespace tiles: namespace count is unbounded.
      # Range cellSettings replicate the same red/yellow/green thresholds
      # the previous StatChart tiles used, since this ratio is fractional
      # (e.g. 0.8 = one pod degraded out of five), not just discrete 0/1.
      # ------------------------------------------------------------------
      workloads:
        kind: Panel
        spec:
          display:
            name: "Workloads — $cluster"
          plugin:
            kind: Table
            spec:
              columnSettings:
                - name: namespace
                  header: Namespace
                - name: value
                  header: Health
                  format: { unit: decimal, decimalPlaces: 2 }
                  cellSettings:
                    - condition: { kind: Range, spec: { min: 0, max: 0.499 } }
                      text: "Degraded"
                      backgroundColor: "#f2495c"
                    - condition: { kind: Range, spec: { min: 0.5, max: 0.998 } }
                      text: "Partial"
                      backgroundColor: "#fade2a"
                    - condition: { kind: Range, spec: { min: 0.999, max: 1 } }
                      text: "OK"
                      backgroundColor: "#73bf69"
                - name: timestamp
                  hide: true
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    query: '1 - ((count by (namespace) (max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", cluster="$cluster"}[15m]) == 1) or (count by (namespace) (kube_pod_status_ready{condition="true", cluster="$cluster"}) * 0)) / count by (namespace) (kube_pod_status_ready{condition="true", cluster="$cluster"}))'
          links:
            - name: "Workloads"
              url: "${console}/k8s/all-namespaces/core~v1~Pod"
              renderVariables: true
              targetBlank: true

      # ------------------------------------------------------------------
      # Alerts — one row per firing critical alert. No rows = all clear.
      # Table instead of per-alert tiles: firing-alert count is unbounded.
      # Every row here is by definition a firing critical alert, so the
      # whole row is styled red via a Regex ".*" match rather than needing
      # a 0/1 health value like the other panels.
      # ------------------------------------------------------------------
      critical_alerts:
        kind: Panel
        spec:
          display:
            name: "Critical Alerts — $cluster"
          plugin:
            kind: Table
            spec:
              columnSettings:
                - name: alertname
                  header: Alert
                  cellSettings:
                    - condition: { kind: Regex, spec: { expr: ".*" } }
                      backgroundColor: "#f2495c"
                - name: value
                  hide: true
                - name: timestamp
                  hide: true
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource: { kind: PrometheusDatasource, name: dynamic-fleet-thanos-datasource }
                    # count by (alertname): strips every other label down to
                    # just "alertname", same reasoning as the Nodes/Workloads
                    # panels above.
                    query: 'count by (alertname) (ALERTS{alertstate="firing", severity="critical", cluster="$cluster"})'
          links:
            - name: "Alerting"
              url: "${console}/monitoring/alerts"
              renderVariables: true
              targetBlank: true

    layouts:
      - kind: Grid
        spec:
          display:
            title: Core Platform
          items:
            - x: 0
              "y": 0
              width: 24
              height: 6
              content:
                $ref: "#/spec/panels/core_platform"
      - kind: Grid
        spec:
          display:
            title: Nodes
          items:
            - x: 0
              "y": 0
              width: 24
              height: 8
              content:
                $ref: "#/spec/panels/nodes"
      - kind: Grid
        spec:
          display:
            title: Workloads & Alerts
          items:
            - x: 0
              "y": 0
              width: 18
              height: 8
              content:
                $ref: "#/spec/panels/workloads"
            - x: 18
              "y": 0
              width: 6
              height: 8
              content:
                $ref: "#/spec/panels/critical_alerts"
