apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: my-new-perses-dashboard
  namespace: openshift-cluster-observability-operator
spec:
  config:
    display:
      name: "Cluster - Operators"
      description: "Cloud-native multi-cluster operator overview tracking via RHACM Observability mesh"
    duration: 6h
    variables:
      # Cluster picker — mirrors Grafana's $cluster query variable.
      # Pulls the `cluster` label from cluster_operator_conditions so the list
      # only shows clusters that actually have operator metrics.
      - kind: ListVariable
        spec:
          allowAllValue: false
          allowMultiple: false
          display:
            name: Cluster
          name: cluster
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: dynamic-fleet-thanos-datasource
              labelName: cluster
              matchers:
                - cluster_operator_conditions
          sort: alphabetical-asc

      # Dynamic console URL — mirrors Grafana's $console query variable.
      # RHACM Observability publishes console_url{url="https://...", cluster="..."}
      # as a gauge; pulling the `url` label gives the correct console base URL
      # for whichever cluster is selected above.
      - kind: ListVariable
        spec:
          allowAllValue: false
          allowMultiple: false
          display:
            name: Console URL
            hidden: true
          name: console
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: dynamic-fleet-thanos-datasource
              labelName: url
              matchers:
                - 'console_url{cluster="$cluster"}'

    panels:
      # Table instead of one tile per operator: a typical OpenShift cluster
      # has 30+ ClusterOperators, which turns a StatChart tile grid into an
      # unscrollable wall (same reasoning as the Nodes/Workloads/Alerts
      # panels in acm-clusters-overview.yaml).
      "operator_matrix_panel":
        kind: Panel
        spec:
          display:
            name: "Operator status"
          plugin:
            kind: Table
            spec:
              columnSettings:
                - name: name
                  header: Operator
                - name: cluster
                  hide: true
                - name: value
                  header: Status
                  cellSettings:
                    - condition: { kind: Value, spec: { value: "1" } }
                      text: "Available"
                      backgroundColor: "#73bf69"
                    - condition: { kind: Value, spec: { value: "2" } }
                      text: "Progressing"
                      backgroundColor: "#fade2a"
                    - condition: { kind: Value, spec: { value: "3" } }
                      text: "Progressing and Available"
                      backgroundColor: "#73bf69"
                    - condition: { kind: Value, spec: { value: "4" } }
                      text: "Degraded"
                      backgroundColor: "#f2495c"
                    - condition: { kind: Value, spec: { value: "5" } }
                      text: "Degraded but Available"
                      backgroundColor: "#ff9830"
                    - condition: { kind: Value, spec: { value: "6" } }
                      text: "Degraded but Progressing"
                      backgroundColor: "#ff9830"
                - name: timestamp
                  hide: true
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: dynamic-fleet-thanos-datasource
                    minStep: ""
                    query: |
                      sum by (name, cluster) (
                        (cluster_operator_conditions{cluster=~"$cluster", condition="Degraded"} == 1) * 4 or
                        (cluster_operator_conditions{cluster=~"$cluster", condition="Progressing"} == 1) * 2 or
                        (cluster_operator_conditions{cluster=~"$cluster", condition="Available"} == 1) * 1
                      )
          # Panel-level link to the cluster operators list page. Table panels
          # support a per-column dataLink field, which could point each row
          # at its own operator's console page — not done here since it
          # needs verifying whether dataLink can reference the row's own
          # cell value (e.g. the operator name) rather than only dashboard
          # variables like $console/$cluster.
          links:
            - name: "Cluster Operators"
              url: "${console}/settings/cluster/clusteroperators"
              renderVariables: true
              targetBlank: true

    layouts:
      - kind: Grid
        spec:
          display:
            title: Operations Grid View
          items:
            - x: 0
              "y": 0
              width: 24
              height: 8
              content:
                $ref: "#/spec/panels/operator_matrix_panel"
